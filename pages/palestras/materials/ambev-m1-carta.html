<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Carta das 3 Análises — Ambev DS4DM — Inteli Exec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --exec-navy: #252640;
      --exec-gold: #D93B58;
      --exec-paper: #F0F2F2;
      --exec-line: #d6d4d8;
      --exec-muted: #6a6c84;
      --c-desc: #1863dc;   /* descritiva — azul */
      --c-pred: #d98a1f;   /* preditiva — âmbar */
      --c-pres: #2e9e63;   /* prescritiva — verde */
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100vh; font-family: "Manrope", sans-serif;
      background: var(--exec-navy); color: var(--exec-navy);
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    .wrap { flex: 1; display: flex; flex-direction: column; padding: 18px 16px 14px; max-width: 560px; margin: 0 auto; width: 100%; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .top img { height: 24px; }
    .top .tag { color: #fff; font-size: 0.6rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.85; text-align: right; }

    .card {
      background: #fff; border-radius: 18px; padding: 20px 20px 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.32);
      border-top: 6px solid var(--exec-gold);
      display: flex; flex-direction: column; flex: 1;
      animation: pop 0.35s ease-out;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }

    .cardhead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cardnum { background: var(--exec-navy); color: #fff; font-size: 0.82rem; font-weight: 800; padding: 5px 12px; border-radius: 999px; letter-spacing: 0.04em; }
    .company { display: inline-flex; align-items: center; gap: 7px; }
    .company .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--exec-gold); }
    .company span { font-size: 0.7rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--exec-muted); }

    .label { font-size: 0.66rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--exec-gold); margin-bottom: 8px; }
    .ask { font-size: 1.38rem; font-weight: 800; line-height: 1.3; color: var(--exec-navy); margin: 0; }
    .ask .q { color: var(--exec-gold); font-family: Georgia, serif; }

    .spacer { flex: 1; min-height: 14px; }

    .prompt { font-size: 0.82rem; font-weight: 700; color: var(--exec-muted); margin: 0 0 10px; }
    .choices { display: grid; gap: 9px; }
    .choice {
      font-family: inherit; text-align: left; border: 2px solid var(--exec-line);
      background: #fff; border-radius: 12px; padding: 13px 15px; cursor: pointer;
      display: flex; align-items: baseline; gap: 9px; transition: all 0.12s ease;
    }
    .choice:active { transform: scale(0.99); }
    .choice .nm { font-size: 1rem; font-weight: 800; color: var(--exec-navy); }
    .choice .ds { font-size: 0.8rem; color: var(--exec-muted); font-weight: 600; }
    .choice[data-k="desc"].sel { border-color: var(--c-desc); background: rgba(24,99,220,0.08); }
    .choice[data-k="pred"].sel { border-color: var(--c-pred); background: rgba(217,138,31,0.10); }
    .choice[data-k="pres"].sel { border-color: var(--c-pres); background: rgba(46,158,99,0.10); }
    .choice[data-k="desc"].sel .nm { color: var(--c-desc); }
    .choice[data-k="pred"].sel .nm { color: var(--c-pred); }
    .choice[data-k="pres"].sel .nm { color: var(--c-pres); }
    .choice.sel::after { content: "✓"; margin-left: auto; font-weight: 900; align-self: center; }
    .choice[data-k="desc"].sel::after { color: var(--c-desc); }
    .choice[data-k="pred"].sel::after { color: var(--c-pred); }
    .choice[data-k="pres"].sel::after { color: var(--c-pres); }

    .saved { margin-top: 12px; font-size: 0.84rem; font-weight: 700; color: var(--exec-navy); background: var(--exec-paper); border-radius: 10px; padding: 11px 14px; display: none; }
    .saved.show { display: block; animation: pop 0.3s ease-out; }
    .saved strong { color: var(--exec-gold); }

    .btn-next {
      margin-top: 12px; font-family: inherit; font-size: 1rem; font-weight: 800;
      border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%;
      background: var(--exec-gold); color: #fff;
    }
    .btn-next:active { transform: scale(0.98); }

    .foot { text-align: center; color: rgba(255,255,255,0.6); font-size: 0.68rem; font-weight: 600; padding: 12px 16px 2px; }
    .foot a { color: rgba(255,255,255,0.85); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <img src="https://res.cloudinary.com/dyhjjms8y/image/upload/v1779227253/Captura_de_tela_2026-05-19_184615_asjkpw.png" alt="Logo Inteli Exec">
      <span class="tag">Cartas das 3 Análises<br>Ambev · DS4DM · M1</span>
    </div>

    <div class="card">
      <div class="cardhead">
        <span class="cardnum" id="cardNum">Carta #—</span>
        <span class="company"><span class="dot"></span><span id="company">—</span></span>
      </div>
      <div class="label">Pedido que chegou na sua mesa</div>
      <h1 class="ask"><span class="q">"</span><span id="ask">Carregando…</span><span class="q">"</span></h1>

      <div class="spacer"></div>

      <p class="prompt">Como você classificaria este pedido?</p>
      <div class="choices">
        <button class="choice" data-k="desc" onclick="pick('desc')"><span class="nm">Descritiva</span><span class="ds">o que aconteceu?</span></button>
        <button class="choice" data-k="pred" onclick="pick('pred')"><span class="nm">Preditiva</span><span class="ds">o que vai acontecer?</span></button>
        <button class="choice" data-k="pres" onclick="pick('pres')"><span class="nm">Prescritiva</span><span class="ds">o que devemos fazer?</span></button>
      </div>

      <div class="saved" id="saved">✓ Resposta registrada. Guarde a sua <strong id="savedNum">carta</strong> — vamos conferir todas juntos no telão.</div>

      <button class="btn-next" onclick="draw()">🔀 Sortear outra carta</button>
    </div>
  </div>

  <div class="foot">Inteli Exec · <a href="https://afonsolelis.github.io/aulas/pages/home-palestras.html">aulas.inteli</a> · Módulo 1 — Definindo o Problema</div>

  <script>
    // Baralho das 3 análises — casos de fronteira. O gabarito NÃO vive aqui:
    // fica no slide de gabarito do deck, para a discussão em plenária.
    const CARTAS = [
      { co: "Ambev",   ask: "Por que a geladeira que instalamos no bar do Centro não aumentou o giro como a gente esperava?" },
      { co: "Ambev",   ask: "Qual preço da Spaten lata no PDV da Faria Lima maximiza a margem sem derrubar o volume?" },
      { co: "Ambev",   ask: "Se eu lançar a promoção de Spaten 2 semanas antes do Carnaval, quanto de volume incremental devo esperar?" },
      { co: "Disney+", ask: "Quais títulos tiveram mais horas assistidas no último trimestre, por faixa etária?" },
      { co: "Ambev",   ask: "Quais clientes do Bees se parecem com os que mais cresceram em Original no último ano?" },
      { co: "Ambev",   ask: "Como redesenhar a rota dos caminhões em Campinas para cortar km rodado mantendo o SLA de entrega?" },
      { co: "Disney+", ask: "Que mix de lançamentos eu priorizo no próximo trimestre para reduzir o churn de famílias com crianças?" },
      { co: "Ambev",   ask: "Qual foi o nosso share of visits no Bees neste trimestre, comparado ao anterior?" },
      { co: "Disney+", ask: "Quais assinantes do plano anual têm maior risco de não renovar nos próximos 60 dias?" },
      { co: "Ambev",   ask: "Vale mais a pena investir o budget de trade em geladeira nova ou em desconto de preço no PDV X?" }
    ];

    let atual = -1, escolha = null;

    function draw() {
      let i = Math.floor(Math.random() * CARTAS.length);
      if (CARTAS.length > 1 && i === atual) i = (i + 1) % CARTAS.length; // evita repetir na sequência
      atual = i; escolha = null;
      const c = CARTAS[i];
      document.getElementById("cardNum").textContent = "Carta #" + (i + 1);
      document.getElementById("company").textContent = c.co;
      document.getElementById("ask").textContent = c.ask;
      document.querySelectorAll(".choice").forEach(b => b.classList.remove("sel"));
      document.getElementById("saved").classList.remove("show");
      window.scrollTo(0, 0);
    }

    function pick(k) {
      escolha = k;
      document.querySelectorAll(".choice").forEach(b => b.classList.toggle("sel", b.dataset.k === k));
      document.getElementById("savedNum").textContent = "carta #" + (atual + 1);
      document.getElementById("saved").classList.add("show");
    }

    draw();
  </script>
</body>
</html>
