<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Carta das 3 Análises — Ambev DS4DM — Inteli Exec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --exec-navy: #252640;
      --exec-gold: #D93B58;
      --exec-paper: #F0F2F2;
      --exec-line: #d6d4d8;
      --exec-muted: #6a6c84;
      --c-desc: #1863dc;   /* descritiva — azul */
      --c-pred: #d98a1f;   /* preditiva — âmbar */
      --c-pres: #2e9e63;   /* prescritiva — verde */
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100vh; font-family: "Manrope", sans-serif;
      background: var(--exec-navy); color: var(--exec-navy);
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    .wrap { flex: 1; display: flex; flex-direction: column; padding: 20px 18px 16px; max-width: 560px; margin: 0 auto; width: 100%; }

    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .top img { height: 26px; }
    .top .tag { color: #fff; font-size: 0.62rem; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; opacity: 0.85; text-align: right; }

    .card {
      background: #fff; border-radius: 18px; padding: 26px 22px 22px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.32);
      border-top: 6px solid var(--exec-gold);
      display: flex; flex-direction: column; flex: 1;
      animation: pop 0.35s ease-out;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(16px) scale(0.98); } to { opacity: 1; transform: none; } }

    .company { display: inline-flex; align-items: center; gap: 8px; align-self: flex-start; margin-bottom: 14px; }
    .company .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--exec-gold); }
    .company span { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--exec-muted); }

    .label { font-size: 0.68rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--exec-gold); margin-bottom: 10px; }
    .ask { font-size: 1.5rem; font-weight: 800; line-height: 1.28; color: var(--exec-navy); margin: 0 0 6px; }
    .ask .q { color: var(--exec-gold); font-family: Georgia, serif; }
    .hint { font-size: 0.9rem; color: var(--exec-muted); margin: 10px 0 0; line-height: 1.4; }

    .spacer { flex: 1; min-height: 18px; }

    .reveal { margin-top: 16px; border-top: 1px dashed var(--exec-line); padding-top: 16px; display: none; animation: pop 0.3s ease-out; }
    .reveal.show { display: block; }
    .verdict { display: inline-block; padding: 7px 16px; border-radius: 999px; font-size: 0.95rem; font-weight: 800; letter-spacing: 0.04em; color: #fff; margin-bottom: 10px; }
    .verdict.desc { background: var(--c-desc); }
    .verdict.pred { background: var(--c-pred); }
    .verdict.pres { background: var(--c-pres); }
    .why { font-size: 0.96rem; line-height: 1.5; color: var(--exec-navy); margin: 0; }
    .why strong { color: var(--exec-gold); }

    .btns { margin-top: 18px; display: grid; gap: 10px; }
    button {
      font-family: inherit; font-size: 1rem; font-weight: 800; border: none;
      padding: 16px; border-radius: 12px; cursor: pointer; width: 100%;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }
    button:active { transform: scale(0.98); }
    .btn-reveal { background: var(--exec-navy); color: #fff; }
    .btn-reveal.done { background: var(--exec-paper); color: var(--exec-muted); }
    .btn-next { background: var(--exec-gold); color: #fff; }

    .foot { text-align: center; color: rgba(255,255,255,0.6); font-size: 0.7rem; font-weight: 600; padding: 14px 18px 4px; letter-spacing: 0.04em; }
    .foot a { color: rgba(255,255,255,0.85); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <img src="https://res.cloudinary.com/dyhjjms8y/image/upload/v1779227253/Captura_de_tela_2026-05-19_184615_asjkpw.png" alt="Logo Inteli Exec">
      <span class="tag">Cartas das 3 Análises<br>Ambev · DS4DM · M1</span>
    </div>

    <div class="card">
      <div class="company"><span class="dot"></span><span id="company">—</span></div>
      <div class="label">Pedido que chegou na sua mesa</div>
      <h1 class="ask"><span class="q">"</span><span id="ask">Carregando…</span><span class="q">"</span></h1>
      <p class="hint">Antes de revelar: <strong>descritiva</strong>, <strong>preditiva</strong> ou <strong>prescritiva</strong>? E qual <em>decisão</em> esse dado habilita?</p>

      <div class="spacer"></div>

      <div class="reveal" id="reveal">
        <div class="verdict" id="verdict">—</div>
        <p class="why" id="why">—</p>
      </div>

      <div class="btns">
        <button class="btn-reveal" id="btnReveal" onclick="toggleReveal()">Pensei! Ver classificação ↓</button>
        <button class="btn-next" onclick="draw()">🔀 Sortear outra carta</button>
      </div>
    </div>
  </div>

  <div class="foot">Inteli Exec · <a href="https://afonsolelis.github.io/aulas/pages/home-palestras.html">aulas.inteli</a> · Módulo 1 — Definindo o Problema</div>

  <script>
    // Baralho das 3 análises — mix Ambev + Disney+. classe: desc | pred | pres
    const CARTAS = [
      { co: "Ambev",    classe: "desc", nome: "Descritiva",  ask: "Quantos HL de Spaten vendemos por região no último trimestre?", why: "Pergunta sobre o <strong>passado</strong>, factual. É um relatório — descreve o que já aconteceu." },
      { co: "Ambev",    classe: "pred", nome: "Preditiva",   ask: "Qual a probabilidade de ruptura de estoque no CDD de Campinas nos próximos 7 dias?", why: "Estima um <strong>evento futuro</strong> com probabilidade. Olha para frente." },
      { co: "Ambev",    classe: "pres", nome: "Prescritiva", ask: "Em qual PDV instalar a próxima geladeira para maximizar o HL incremental?", why: "Pede a <strong>melhor ação</strong> entre opções — otimização. Decide algo." },
      { co: "Ambev",    classe: "desc", nome: "Descritiva",  ask: "Quais bares do Rio pararam de comprar Stella?", why: "⚠️ Parece pedir ação, mas é <strong>diagnóstico do passado</strong>. Só lista — não recomenda nada." },
      { co: "Ambev",    classe: "pred", nome: "Preditiva",   ask: "Quanto de Spaten vamos vender no Natal?", why: "<strong>Previsão de demanda</strong> futura. Não decide nada ainda — estima." },
      { co: "Disney+",  classe: "pres", nome: "Prescritiva", ask: "Que oferta eu envio para reter o João, que está terminando o trial?", why: "Recomenda a <strong>ação ótima</strong>. Faz par com a previsão de cancelamento." },
      { co: "Disney+",  classe: "pred", nome: "Preditiva",   ask: "Qual a probabilidade do João cancelar ao fim do trial?", why: "<strong>Previsão</strong> de um evento futuro. Previsão ≠ recomendação — esse é o ponto." },
      { co: "Disney+",  classe: "pres", nome: "Prescritiva", ask: "Em que mês a Marvel deve lançar a próxima série para maximizar adesão?", why: "Decisão <strong>otimizada</strong> de timing — o que fazer e quando." },
      { co: "Disney+",  classe: "desc", nome: "Descritiva",  ask: "Quantos assinantes assistiram Frozen 2 no mês passado?", why: "<strong>Contagem do passado</strong>. Puro descritivo." },
      { co: "Ambev",    classe: "pres", nome: "Prescritiva", ask: "Qual o mix ótimo de Spaten vs Skol nos bares da Faria Lima para 2026?", why: "Recomendação de <strong>mix</strong> — otimização que orienta a decisão comercial." }
    ];

    let atual = -1;

    function draw() {
      let i = Math.floor(Math.random() * CARTAS.length);
      if (CARTAS.length > 1 && i === atual) i = (i + 1) % CARTAS.length; // evita repetir a mesma na sequência
      atual = i;
      const c = CARTAS[i];
      document.getElementById("company").textContent = c.co;
      document.getElementById("ask").textContent = c.ask;
      const v = document.getElementById("verdict");
      v.textContent = c.nome;
      v.className = "verdict " + c.classe;
      document.getElementById("why").innerHTML = c.why;
      hideReveal();
      window.scrollTo(0, 0);
    }

    function toggleReveal() {
      const r = document.getElementById("reveal");
      const b = document.getElementById("btnReveal");
      if (r.classList.contains("show")) { hideReveal(); }
      else { r.classList.add("show"); b.classList.add("done"); b.textContent = "Esconder classificação ↑"; }
    }
    function hideReveal() {
      const r = document.getElementById("reveal");
      const b = document.getElementById("btnReveal");
      r.classList.remove("show"); b.classList.remove("done"); b.textContent = "Pensei! Ver classificação ↓";
    }

    draw();
  </script>
</body>
</html>
