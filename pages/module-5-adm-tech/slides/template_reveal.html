<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Template - Inteli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/theme/white.min.css">
    <style>
        .reveal-buttons {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .btn-nav {
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .btn-home { background: #2e2640; color: white; }
        .btn-material { background: #ff4545; color: white; }
        .btn-nav:hover { opacity: 0.8; color: white; }
    </style>
</head>
<body>
    <div class="reveal">
        <div class="slides">
            <section>
                <h1>Título da Aula</h1>
                <p>Use as setas para navegar</p>
            </section>
            <section>
                <h2>Conteúdo</h2>
                <ul>
                    <li>Tópico 1</li>
                    <li>Tópico 2</li>
                </ul>
            </section>
        </div>
    </div>

    <div class="reveal-buttons">
        <a href="../../home_module-5-adm-tech.html" class="btn-nav btn-home">🏠 Home</a>
        <a href="../materials/lesson-1-material.html" class="btn-nav btn-material">📖 Material</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.5.0/reveal.min.js"></script>
    <script>
        Reveal.initialize({
            hash: true,
            slideNumber: true,
            transition: 'slide'
        });
    </script>
</body>
</html>
