name: Code Quality Checks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Validate HTML & Config
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Validate JSON files
        run: |
          echo "Validating JSON configuration files..."
          for file in config/*.json; do
            if [ -f "$file" ]; then
              jq . "$file" > /dev/null 2>&1 && echo "✓ $file" || (echo "✗ $file - Invalid JSON"; exit 1)
            fi
          done
      
      - name: Check file naming conventions
        run: |
          echo "Checking file naming conventions..."
          
          # Check for invalid slide names
          find pages -name "*.html" -type f | while read file; do
            if [[ $file =~ module-[0-9]+-[a-z\-]+/slides/ ]]; then
              filename=$(basename "$file")
              if [[ ! $filename =~ ^slide-lesson-[0-9]+\.html$ ]]; then
                echo "✗ Invalid slide naming: $file"
                echo "  Expected: slide-lesson-<n>.html"
                exit 1
              fi
            fi
          done
          echo "✓ File naming conventions are correct"
      
      - name: Verify module directory structure
        run: |
          echo "Verifying module directory structure..."

          # Cada módulo precisa ter pelo menos um slide e um material, em qualquer layout:
          # - subdirectory: slides/*.html + materials/*.html
          # - flat: lesson-N.html + lesson-N-material.html na raiz do módulo
          # - híbrido: combinação dos dois
          for dir in pages/module-*; do
            if [ -d "$dir" ]; then
              slide_count=$(find "$dir" -maxdepth 2 -type f -name '*.html' ! -name '*-material.html' 2>/dev/null | wc -l)
              material_count=$(find "$dir" -maxdepth 2 -type f -name '*-material.html' 2>/dev/null | wc -l)
              if [ "$slide_count" -eq 0 ]; then
                echo "✗ $dir has no slide files"
                exit 1
              fi
              if [ "$material_count" -eq 0 ]; then
                echo "✗ $dir has no material files"
                exit 1
              fi
              echo "✓ $(basename $dir) structure is valid (slides=$slide_count, materials=$material_count)"
            fi
          done
      
      - name: Check for relative paths in HTML
        run: |
          echo "Checking for absolute paths (should be relative)..."
          count=0
          for file in pages/**/*.html index.html; do
            if grep -q 'href="http' "$file" 2>/dev/null || grep -q "src=\"http" "$file" 2>/dev/null; then
              echo "⚠ Warning: Found absolute URLs in $file (consider using relative paths)"
            fi
          done
          echo "✓ Path validation complete"

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Check for exposed credentials
        run: |
          echo "Scanning for potentially exposed credentials..."
          
          # Exclude material files (educational examples)
          if grep -r "password\s*=" pages/ config/ 2>/dev/null | grep -v "placeholder" | grep -v "material.html"; then
            echo "⚠ Warning: Found potential hardcoded credentials"
          fi
          
          if grep -r "API_KEY\|SECRET_KEY\|PRIVATE_KEY" pages/ config/ 2>/dev/null | grep -v "material.html"; then
            echo "✗ Error: Found hardcoded credentials"
            exit 1
          fi
          
          echo "✓ No obvious credentials found"
